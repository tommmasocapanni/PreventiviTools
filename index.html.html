<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preventivo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
input,button,textarea{-webkit-appearance:none;appearance:none;border-radius:0;}
a,button{color:inherit;}
:root{
  --bg:#080808;--surface:#111;--border:#1f1f1f;--border2:#2a2a2a;
  --text:#f5f5f5;--muted:#555;--muted2:#888;--radius:16px;--accent:#f5f5f5;
}
@media(prefers-color-scheme:light){
  :root{--bg:#f2f2f2;--surface:#e8e8e8;--border:#d4d4d4;--border2:#c0c0c0;--text:#111;--muted:#aaa;--muted2:#666;--accent:#ff3d00;}
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{max-width:560px;margin:0 auto;padding:4rem 1.5rem 6rem;}

.header{margin-bottom:3.5rem;}
.title-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
#title-display{font-size:1.75rem;font-weight:300;letter-spacing:-0.5px;color:var(--text);cursor:text;border-bottom:1px solid transparent;transition:border-color .2s;}
#title-display:hover{border-color:var(--border2);}
#title-input{display:none;font-size:1.75rem;font-weight:300;letter-spacing:-0.5px;color:var(--text);background:transparent;border:none;border-bottom:1px solid var(--border2);outline:none;font-family:'Inter',sans-serif;width:100%;}
.header p{font-size:13px;color:var(--muted2);}

.tabs{display:flex;margin-bottom:2.5rem;border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
.tab{flex:1;padding:11px 0;background:transparent;border:none;color:var(--muted2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.tab+.tab{border-left:1px solid var(--border2);}
.tab.active{background:var(--text);color:var(--bg);font-weight:500;}

.rate-row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid var(--border);}
.rate-row label{font-size:11px;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase;}
.rate-edit{display:flex;align-items:center;gap:6px;}
.rate-edit span{font-size:13px;color:var(--muted2);}
.rate-edit input{background:transparent;border:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;width:52px;text-align:right;outline:none;}

.criteria{margin-top:2rem;display:flex;flex-direction:column;gap:2rem;}
.crit-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.pills{display:flex;flex-wrap:wrap;gap:8px;}
.pill{padding:8px 16px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;}
.pill:hover{border-color:#3a3a3a;color:var(--text);}
.pill.active{border-color:var(--accent);color:var(--accent);}

.divider{height:1px;background:var(--border);margin:2.5rem 0;}

.result{display:none;animation:fadeUp .3s ease;}
.result.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.result-price{font-size:2.8rem;font-weight:300;letter-spacing:-1px;color:var(--text);margin-bottom:4px;}
.result-sub{font-size:13px;color:var(--muted2);margin-bottom:1.5rem;}
.result-meta{display:flex;gap:2.5rem;margin-bottom:2rem;}
.meta-item .ml{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.meta-item .mv{font-size:14px;color:var(--muted2);}

.pkg-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.packages{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:2rem;}
.pkg{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--surface);border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;text-align:left;width:100%;}
.pkg:hover{background:#161616;}
.pkg-left{display:flex;align-items:center;gap:12px;}
.pkg-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--muted);flex-shrink:0;transition:all .15s;}
.pkg.selected .pkg-dot{background:var(--accent);border-color:var(--accent);}
.pkg-name{font-size:13px;color:var(--text);}
.pkg-desc{font-size:12px;color:var(--muted2);margin-top:1px;}
.pkg-price{font-size:13px;color:var(--muted2);white-space:nowrap;}
.pkg.selected .pkg-price{color:var(--accent);}

.notes-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--muted2);font-size:13px;padding:12px 0;outline:none;font-family:'Inter',sans-serif;resize:none;min-height:60px;transition:border-color .2s;}
textarea::placeholder{color:var(--muted);}
textarea:focus{border-color:var(--border2);color:var(--text);}

.actions{display:flex;gap:10px;margin-top:2.5rem;}
.btn{padding:11px 24px;border-radius:100px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;border:1px solid;transition:all .18s;}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:transparent;color:var(--muted2);border-color:var(--border2);}
.btn-ghost:hover{color:var(--text);border-color:#3a3a3a;}

/* SUMMARY */
.summary{display:none;margin-top:2.5rem;border-top:1px solid var(--border);padding-top:2rem;}
.summary.visible{display:block;}
.sum-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.sum-head{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.sum-hint{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sum-hint svg{opacity:.5;}

/* ogni riga del riepilogo */
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:opacity .2s;}
.sum-row.hidden-row{opacity:.25;}
.sum-row .k{color:var(--muted2);}
.sum-row .v{color:var(--text);}
.sum-row .hide-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;margin-left:12px;transition:background .15s;}
.sum-row:hover .hide-dot{background:var(--muted);}
.sum-row.hidden-row .hide-dot{background:var(--accent);}
.sum-kv{display:flex;justify-content:space-between;flex:1;}

.sum-notes{margin-top:14px;font-size:12px;color:var(--muted2);line-height:1.6;}

/* share btn */
.btn-share{display:flex;align-items:center;gap:7px;}
.btn-share svg{flex-shrink:0;}

@media print{
.no-print{display:none!important;}
:root{--bg:#fff!important;--surface:#f5f5f5!important;--border:#ddd!important;--border2:#ccc!important;--text:#111!important;--muted:#aaa!important;--muted2:#444!important;}
body{background:#fff!important;color:#111!important;}
.summary{display:block!important;}
.result{display:block!important;}
.sum-row.hidden-row{display:none!important;}
.hide-dot{display:none!important;}
.sum-hint{display:none!important;}
*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>

</head>
<body>
<div class="app">

  <div class="header no-print">
    <div class="title-wrap">
      <span id="title-display" onclick="startEdit()" title="Clicca per rinominare">Nuovo preventivo</span>
      <input id="title-input" type="text" value="Nuovo preventivo" onblur="stopEdit()" onkeydown="if(event.key==='Enter')stopEdit()">
    </div>
    <p>Web · Motion Graphic · Logo & Brand</p>
  </div>

  <div class="tabs no-print">
    <button class="tab active" onclick="switchCat(0)">Web</button>
    <button class="tab" onclick="switchCat(1)">Motion</button>
    <button class="tab" onclick="switchCat(2)">Logo</button>
  </div>

  <div class="rate-row no-print">
    <label>Tariffa oraria</label>
    <div class="rate-edit">
      <input type="number" id="rate-input" value="50" min="1" oninput="computeResult()">
      <span>€ / h</span>
    </div>
  </div>

  <div class="criteria no-print" id="criteria-wrap"></div>
  <div class="divider"></div>

  <div class="result" id="result-box">
    <div class="result-price" id="r-price">—</div>
    <div class="result-sub" id="r-badge"></div>
    <div class="result-meta">
      <div class="meta-item"><div class="ml">Ore stimate</div><div class="mv" id="r-hours">—</div></div>
      <div class="meta-item"><div class="ml">Consegna</div><div class="mv" id="r-delivery">—</div></div>
    </div>
    <div id="pkg-section" style="display:none">
      <div class="pkg-label">Pacchetti fissi</div>
      <div class="packages" id="pkg-list"></div>
    </div>
  </div>

  <div class="no-print">
    <div class="notes-label">Note</div>
    <textarea id="notes" placeholder="Dettagli aggiuntivi, richieste speciali…" rows="3"></textarea>
  </div>

  <div class="actions no-print">
    <button class="btn btn-primary" onclick="generateSummary()">Genera riepilogo</button>
    <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
  </div>

  <div class="summary" id="summary">
    <div class="sum-header">
      <div class="sum-head">Riepilogo</div>
      <div class="sum-hint no-print">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1"/><path d="M4 6h4M6 4v4" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        Tocca una riga per nasconderla
      </div>
    </div>
    <div id="sum-rows"></div>
    <div class="sum-notes" id="sum-notes"></div>
    <div class="actions no-print" style="margin-top:1.5rem">
      <button class="btn btn-primary btn-share" onclick="shareOrPrint()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        Condividi
      </button>
    </div>
  </div>

</div>
<script>
const cats=[
  {name:"Web",rate:50,criteria:[
    {label:"Tipo progetto",pills:[{t:"Landing page",h:[4,8],d:3},{t:"Sito vetrina",h:[10,20],d:8},{t:"Multilingue",h:[20,35],d:18},{t:"E-commerce",h:[30,60],d:25}]},
    {label:"Grafica",pills:[{t:"Template",h:[0,0],d:0},{t:"Custom parziale",h:[4,8],d:3},{t:"Full custom",h:[10,20],d:7}]},
    {label:"Integrazioni",pills:[{t:"Nessuna",h:[0,0],d:0},{t:"CMS / form",h:[2,5],d:2},{t:"API / pagamenti",h:[6,14],d:5}]}
  ],packages:[
    {name:"Landing Starter",desc:"1 pagina · template · form",price:"€250–400"},
    {name:"Sito Vetrina",desc:"4 pag · grafica custom",price:"€600–900"},
    {name:"E-commerce Base",desc:"Shopify / WooCommerce setup",price:"€1.200–2.000"}
  ]},
  {name:"Motion",rate:65,criteria:[
    {label:"Durata",pills:[{t:"< 15 sec",h:[4,8],d:3},{t:"15–30 sec",h:[8,16],d:5},{t:"30–60 sec",h:[16,30],d:10},{t:"60+ sec",h:[30,60],d:20}]},
    {label:"Stile",pills:[{t:"2D flat",h:[0,0],d:0},{t:"2D dettagliato",h:[4,10],d:3},{t:"3D / compositing",h:[10,24],d:8}]},
    {label:"Revisioni",pills:[{t:"1 round",h:[0,0],d:0},{t:"2 round",h:[2,4],d:1},{t:"3+ round",h:[5,10],d:3}]}
  ],packages:[
    {name:"Logo Animation",desc:"< 5 sec · loop",price:"€80–150"},
    {name:"Short Spot",desc:"15–30 sec · 2D · 1 rev",price:"€350–600"},
    {name:"Video Completo",desc:"30–60 sec · custom · 2 rev",price:"€800–1.500"}
  ]},
  {name:"Logo",rate:55,criteria:[
    {label:"Pacchetto",pills:[{t:"Solo logo",h:[4,8],d:4},{t:"Logo + visual",h:[8,14],d:6},{t:"Brand kit",h:[16,30],d:14}]},
    {label:"Formati",pills:[{t:"Digitale",h:[0,0],d:0},{t:"+ Stampa",h:[1,2],d:1},{t:"+ Brandbook",h:[4,8],d:3}]},
    {label:"Urgenza",pills:[{t:"Normale",h:[1,1],d:0},{t:"Priorità +20%",h:[1.2,1.2],d:0},{t:"Urgente +40%",h:[1.4,1.4],d:0}]}
  ],packages:[
    {name:"Logo Starter",desc:"1 concept · digitale · 1 rev",price:"€200–350"},
    {name:"Logo Pro",desc:"2 concept · formati completi",price:"€400–650"},
    {name:"Brand Kit",desc:"Logo + identity + brandbook",price:"€800–1.400"}
  ]}
];

let cur=0,sel=[[null,null,null],[null,null,null],[null,null,null]],selPkg=[null,null,null];
let hiddenRows=new Set();

function startEdit(){
const d=document.getElementById('title-display'),i=document.getElementById('title-input');
i.value=d.textContent;d.style.display='none';i.style.display='block';i.focus();i.select();
}
function stopEdit(){
const d=document.getElementById('title-display'),i=document.getElementById('title-input');
d.textContent=i.value.trim()||'Nuovo preventivo';d.style.display='';i.style.display='none';
}

function switchCat(i){
cur=i;
document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
document.getElementById('rate-input').value=cats[i].rate;
buildCriteria();computeResult();
}

function buildCriteria(){
document.getElementById('criteria-wrap').innerHTML=cats[cur].criteria.map((c,ci)=>`
  <div>
    <div class="crit-label">${c.label}</div>
    <div class="pills">${c.pills.map((p,pi)=>`
      <button class="pill ${sel[cur][ci]===pi?'active':''}" onclick="pick(${ci},${pi})">${p.t}</button>
    `).join('')}</div>
  </div>`).join('');
}

function pick(ci,pi){sel[cur][ci]=sel[cur][ci]===pi?null:pi;buildCriteria();computeResult();}

function fmtDays(d){
if(!d)return'—';if(d<=1)return'1 giorno';if(d<5)return`${d} giorni`;
const w=Math.round(d/5*10)/10;return w<=1?'~1 settimana':`~${w} settimane`;
}

function computeResult(){
cats[cur].rate=+document.getElementById('rate-input').value||50;
const cat=cats[cur],s=sel[cur],rate=cat.rate,box=document.getElementById('result-box');
if(s.every(v=>v===null)){box.classList.remove('visible');return;}
let hMin=0,hMax=0,days=0,urgM=1;
cat.criteria.forEach((c,ci)=>{
if(s[ci]===null)return;const p=c.pills[s[ci]];
if(p.h[0]>1&&p.h[0]===p.h[1]){urgM=p.h[0];return;}
hMin+=p.h[0];hMax+=p.h[1];days+=p.d||0;
});
hMin=Math.round(hMin*urgM);hMax=Math.round(hMax*urgM);
if(urgM>1)days=Math.ceil(days/urgM);
const pMin=hMin*rate,pMax=hMax*rate;
document.getElementById('r-price').textContent=pMin===pMax?`€${pMin}`:`€${fmt(pMin)} – €${fmt(pMax)}`;
document.getElementById('r-hours').textContent=hMin===hMax?`${hMin}h`:`${hMin}–${hMax}h`;
document.getElementById('r-delivery').textContent=fmtDays(days);
const tot=hMin+hMax;
document.getElementById('r-badge').textContent=tot<=16?'Bassa complessità':tot<=40?'Media complessità':'Alta complessità';
const isSmall=tot<=20;
document.getElementById('pkg-section').style.display=isSmall?'block':'none';
if(isSmall){
document.getElementById('pkg-list').innerHTML=cat.packages.map((p,i)=>`
  <button class="pkg ${selPkg[cur]===i?'selected':''}" onclick="pickPkg(${i})">
    <div class="pkg-left"><div class="pkg-dot"></div>
    <div><div class="pkg-name">${p.name}</div><div class="pkg-desc">${p.desc}</div></div>
    </div>
    <div class="pkg-price">${p.price}</div>
  </button>`).join('');
}
box.classList.add('visible');
}

function pickPkg(i){selPkg[cur]=selPkg[cur]===i?null:i;computeResult();}
function fmt(n){return n.toLocaleString('it-IT');}

function toggleRow(idx){
if(hiddenRows.has(idx))hiddenRows.delete(idx);else hiddenRows.add(idx);
document.querySelectorAll('.sum-row').forEach((r,i)=>r.classList.toggle('hidden-row',hiddenRows.has(i)));
}

function buildSumRow(k,v,idx){
return`<div class="sum-row ${hiddenRows.has(idx)?'hidden-row':''}" onclick="toggleRow(${idx})">
<div class="sum-kv"><span class="k">${k}</span><span class="v">${v}</span></div>
<div class="hide-dot"></div>
</div>`;
}

function generateSummary(){
const cat=cats[cur],s=sel[cur],rate=cat.rate;
const pkg=selPkg[cur]!==null?cat.packages[selPkg[cur]]:null;
const notes=document.getElementById('notes').value.trim();
const title=document.getElementById('title-display').textContent;
hiddenRows.clear();
const rows=[
[title,'Preventivo'],
[cat.name,'Categoria'],
[new Date().toLocaleDateString('it-IT'),'Data'],
[`€${rate}/h`,'Tariffa'],
];
cat.criteria.forEach((c,ci)=>{if(s[ci]!==null)rows.push([cat.criteria[ci].pills[s[ci]].t,c.label]);});
rows.push([document.getElementById('r-hours').textContent,'Ore stimate']);
rows.push([document.getElementById('r-price').textContent,'Prezzo']);
rows.push([document.getElementById('r-delivery').textContent,'Consegna']);
if(pkg)rows.push([`${pkg.name} · ${pkg.price}`,'Pacchetto']);

document.getElementById('sum-rows').innerHTML=rows.map(([v,k],i)=>buildSumRow(k,v,i)).join('');
document.getElementById('sum-notes').textContent=notes||'';
const sm=document.getElementById('summary');
sm.classList.add('visible');sm.scrollIntoView({behavior:'smooth'});
}

function shareOrPrint(){
if(navigator.share){
const rows=document.querySelectorAll('.sum-row:not(.hidden-row)');
let text=document.getElementById('title-display').textContent+'\n\n';
rows.forEach(r=>{
const k=r.querySelector('.k').textContent;
const v=r.querySelector('.v').textContent;
text+=`${k}: ${v}\n`;
});
const notes=document.getElementById('sum-notes').textContent;
if(notes)text+=`\nNote: ${notes}`;
navigator.share({title:document.getElementById('title-display').textContent,text}).catch(()=>{});
} else {
window.print();
}
}

function resetAll(){
sel=[[null,null,null],[null,null,null],[null,null,null]];selPkg=[null,null,null];hiddenRows.clear();
document.getElementById('notes').value='';
document.getElementById('result-box').classList.remove('visible');
document.getElementById('summary').classList.remove('visible');
buildCriteria();
}

buildCriteria();
</script>

</body>
</html>
